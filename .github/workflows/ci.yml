name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Start SUT
        run: |
          java -jar ./artifacts/app-mbank.jar &
          sleep 10

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Stop SUT
        run: |
          pkill -f 'java -jar ./artifacts/app-mbank.jar' || true
          killall java || true